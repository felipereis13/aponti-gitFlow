name: CI - Validação HTML e CSS

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validar arquivos HTML e CSS
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar HTML e CSS
        run: npm run lint